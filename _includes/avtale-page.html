{% comment %}
  Avtale page wrapper — wraps the entire avtale page in <section class="avtale-page">.

  Renders the logo and passes through body content (captured markdown).
{% endcomment %}

<section class="avtale-page">
  <img src="{{ '/assets/images/noexcuse-logo-horizontal.webp' | relative_url }}" alt="No Excuse AS" class="avtale-logo">
  {{ include.body | markdownify }}
</section>

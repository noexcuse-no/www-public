<meta charset="UTF-8">
<title>{{ page.title }}</title>
{% assign meta_desc = page.description | default: page.excerpt | default: site.data.metadata.description %}
{% assign meta_desc = meta_desc | strip_html | strip_newlines | truncate: 160 %}
<meta name="description" content="{{ meta_desc }}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="keywords" content="{{ site.data.metadata.keywords }}">
<link rel="canonical" href="https://noexcuse.no{{ page.url }}">
<meta property="og:title" content="{{ page.title | default: site.data.metadata.og_title }}">
<meta property="og:description" content="{{ meta_desc | default: site.data.metadata.og_description }}">
<meta property="og:image" content="{{ site.data.metadata.og_image }}">
<meta property="og:url" content="https://noexcuse.no{{ page.url }}">
<meta property="og:type" content="{{ page.json_ld[0].type | default: site.data.metadata.og_type }}">
<meta property="og:locale" content="{{ site.data.metadata.og_locale }}" />
<meta property="og:site_name" content="{{ site.data.metadata.title }}" />
<meta name="twitter:card" content="{{ site.data.metadata.twitter_card }}">
<meta name="twitter:title" content="{{ page.title | default: site.data.metadata.twitter_title }}">
<meta name="twitter:description" content="{{ meta_desc | default: site.data.metadata.twitter_description }}">
<meta name="twitter:image" content="{{ site.data.metadata.twitter_image }}">
<meta name="twitter:domain" content="{{ site.data.metadata.twitter_domain }}">
<meta name="twitter:url" content="https://noexcuse.no{{ page.url }}">
<meta name="version" content="{{ site.data.metadata.version }}">
<link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.webp">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

{% comment %}
  Question list — staggered slide-in list of questions.

  Expects page.questions (array of strings).
{% endcomment %}

<ul class="question-list stagger-parent" style="--stagger-delay: 80ms;">
  {% for q in page.questions %}
    <li class="animate-on-scroll slide-in-left stagger">{{ q }}</li>
  {% endfor %}
</ul>

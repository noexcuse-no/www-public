<section id="profiles" class="profiles section container">
    {% for profile in site.profiles %}
    <div class="profile">
        <div class="profile-compact">
            <img class="profile-image" src="{{ profile.image | relative_url }}" alt="{{ profile.name }}s profilbilde">
            <h3 class="profile-name">{{ profile.name }}</h3>
            <div class="profile-contact">
                <a href="tel:{{ profile.phone }}" class="profile-phone">{{ profile.phone }}</a>
                <a href="mailto:{{ profile.email }}" class="profile-email">{{ profile.email }}</a>
            </div>
            <button class="profile-expand-btn" aria-label="Vis detaljer">Les mer →</button>
        </div>
        <div class="profile-expanded" id="profile-expanded-{{ forloop.index }}">
            <div class="profile-modal-content">
                <button class="profile-close" aria-label="Lukk">&times;</button>
                <div class="profile-header">
                    <img class="profile-image-large" src="{{ profile.image | relative_url }}" alt="{{ profile.name }}s profilbilde">
                    <div class="profile-header-info">
                        <h3 class="profile-name">{{ profile.name }}</h3>
                        <p class="profile-tags">{{ profile.tags }}</p>
                    </div>
                </div>
                <div class="profile-bio">
                    {{ profile.bio }}
                </div>
                <div class="profile-contact-grid">
                    <a href="tel:{{ profile.phone }}" class="profile-contact-item">{{ profile.phone }}</a>
                    <a href="mailto:{{ profile.email }}" class="profile-contact-item">{{ profile.email }}</a>
                    <a href="{{ profile.linkedin }}" target="_blank" class="profile-contact-item">{{ profile.linkedin }}</a>
                </div>
                <div class="profile-actions">
                    <a href="{{ profile.booking_url }}" class="profile-booking-btn" onclick="openBookingModal('{{ profile.booking_url }}'); return false;">Avtal møte</a>
                </div>
                <div class="profile-details">
                    {{ profile.content }}
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const profiles = document.querySelectorAll('.profile');
    
    profiles.forEach(profile => {
        const compact = profile.querySelector('.profile-compact');
        const expanded = profile.querySelector('.profile-expanded');
        const closeBtn = expanded.querySelector('.profile-close');
        
        compact.addEventListener('click', () => {
            expanded.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            expanded.classList.remove('active');
            document.body.style.overflow = '';
        });
        
        expanded.addEventListener('click', (e) => {
            if (e.target === expanded) {
                expanded.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const active = document.querySelector('.profile-expanded.active');
            if (active) {
                active.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
    });
});
</script>

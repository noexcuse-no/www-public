<section id="products" class="products">
    {% for product in site.products %}
    <div class="product">
        <img src="{{ site.baseurl }}{{ product.image }}" alt="{{ product }} produktbilde">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
    </div>
    <div class="booking-product">
        <center><a href="{{ product.booking_url }}" title="Book et møte med meg">Jeg er interessert</a></center>
    </div>
    {% endfor %}
</section>

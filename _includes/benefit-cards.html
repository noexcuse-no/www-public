{% comment %}
  Benefit cards grid — renders cards for all pages with class: benefit.
  No parameters. Used on the Ledelse 60:2 landing page.
{% endcomment %}

<div class="card-grid card-grid--benefits">
  {% assign benefits = site.pages | where: "class", "benefit" %}
  {% for topic in benefits %}
    {% include card.html topic=topic %}
  {% endfor %}
</div>

{% comment %}
  Section illustration — standalone illustration wrapper with optional float.

  Parameters:
    image     — image path (required)
    alt       — alt text (required)
    float     — left/right for section-illustration--float-* class (optional)
{% endcomment %}

<div class="section-illustration animate-on-scroll fade-in-up">
  <img src="{{ include.image | relative_url }}"
       alt="{{ include.alt }}"
       loading="lazy"
       {% if include.float %}class="section-illustration--float-{{ include.float }}"{% endif %}>
</div>

kramdown:
  footnote_backlink: "↩"

collections:
  pages:
    output: true
    permalink: /:path/
  cases:
    output: true
  partners:
    output: true
  tags:
    output: true
    permalink: /emne/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
      lang: no
      published: true
  - scope:
      path: ""
      type: tags
    values:
      layout: tag
      lang: no
